<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<title>Blog Post Generator</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f7ff;
}

/* top inputs */

.top{

background:white;
padding:20px;
border-bottom:1px solid #ddd;

display:grid;
gap:10px;

}

input,textarea{

padding:10px;
font-size:16px;
border:1px solid #ccc;

}

/* toolbar */

.toolbar{

position:sticky;
top:0;

background:white;

padding:10px;

display:flex;

gap:8px;

border-bottom:1px solid #ddd;

flex-wrap:wrap;

}

button{

padding:6px 10px;

border:1px solid #ccc;

background:white;

cursor:pointer;

}

button:hover{

background:#eee;

}

/* editor */

#editor{

max-width:900px;

margin:40px auto;

background:white;

padding:40px;

min-height:400px;

}

/* output */

.output{

max-width:900px;

margin:40px auto;

}

textarea{

width:100%;

height:300px;

}

</style>

</head>

<body>

<div class="top">

<input id="title" placeholder="Title">

<input id="date" placeholder="Date (2026-03-22)">

<input id="summary" placeholder="Summary">

</div>

<div class="toolbar">

<button onclick="cmd('bold')">Bold</button>

<button onclick="cmd('italic')">Italic</button>

<button onclick="cmd('formatBlock','h1')">H1</button>

<button onclick="cmd('formatBlock','h2')">H2</button>

<button onclick="cmd('insertUnorderedList')">List</button>

<button onclick="cmd('formatBlock','pre')">Code</button>

<button onclick="addLink()">Link</button>

<button onclick="addImage()">Image</button>

<button onclick="generateHTML()">Generate</button>

<button onclick="downloadHTML()">Download</button>

</div>

<div id="editor" contenteditable="true">

<p>Write your article...</p>

</div>

<div class="output">

<h3>Generated HTML</h3>

<textarea id="output"></textarea>

</div>

<script>

let generatedHTML=""

function cmd(command,value=null){

document.execCommand(command,false,value)

}

function addLink(){

const url=prompt("URL")

if(url)

document.execCommand("createLink",false,url)

}

function addImage(){

const url=prompt("Image URL")

if(url)

document.execCommand("insertImage",false,url)

}

function generateHTML(){

const title=
document.getElementById("title").value || "Blog Post"

const date=
document.getElementById("date").value || ""

const summary=
document.getElementById("summary").value || ""

const content=
document.getElementById("editor").innerHTML

generatedHTML=`<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<title>${title}</title>

<meta name="post-title" content="${title}">
<meta name="post-date" content="${date}">
<meta name="post-summary" content="${summary}">

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<nav>

<div class="logo">Portfolio</div>

<div class="nav-links">

<a href="../index.html">Home</a>
<a href="../works.html">Works</a>
<a href="../blog.html">Blog</a>
<a href="../about.html">About</a>

</div>

</nav>

<main class="about">

<h1>${title}</h1>

<p>${date}</p>

${content}

</main>

<footer>

<p>© Portfolio</p>

</footer>

</body>

</html>`

document.getElementById("output").value=generatedHTML

}

function downloadHTML(){

if(!generatedHTML){

generateHTML()

}

const title=
document.getElementById("title").value || "post"

const filename=
title.toLowerCase().replace(/\s+/g,"-")+".html"

const blob=
new Blob([generatedHTML],{type:"text/html"})

const a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download=filename

a.click()

}

</script>

</body>

</html>
